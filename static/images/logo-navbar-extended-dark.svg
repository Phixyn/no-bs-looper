<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 48" role="img" aria-label="No BS Looper">
  <title>No BS Looper</title>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#18181f"/>
      <stop offset="100%" stop-color="#2d2d3d"/>
    </linearGradient>
  </defs>
  <!-- Badge -->
  <rect x="2" y="2" width="44" height="44" rx="8" fill="url(#bg)"/>
  <!-- NO -->
  <text
    x="24" y="18"
    font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
    font-size="13" font-weight="800"
    fill="white" text-anchor="middle"
    letter-spacing="2">NO</text>
  <!-- Separator -->
  <line x1="11" y1="24" x2="37" y2="24" stroke="rgba(255,255,255,0.2)" stroke-width="0.75"/>
  <!-- BS -->
  <text
    x="24" y="40"
    font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
    font-size="13" font-weight="800"
    fill="white" text-anchor="middle"
    letter-spacing="2">BS</text>
  <!-- Wordmark -->
  <text
    x="56" y="31"
    font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
    font-size="20" font-weight="400"
    fill="rgba(208, 208, 217, 0.75)"
    letter-spacing="4">LOOPER</text>
</svg>
